name: Weekly ETL — Update CSVs

on:
  schedule:
    - cron: "0 13 * * 6"   # Saturday 10:00 AM Mendoza (UTC-3)
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: pip install pandas requests python-dotenv

      - name: Run ETL
        run: python main.py
        env:
          TORNEO_URL: ${{ secrets.TORNEO_URL }}

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csv/
          git diff --staged --quiet && echo "No hay cambios en CSVs" || (
            git commit -m "chore: actualizar datos $(date +'%Y-%m-%d %H:%M UTC')" &&
            git push
          )
